<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>車中泊マップ - 統合版</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚐</text></svg>">
<style>
#map{height:100vh;width:100%;}
body{margin:0;padding:0;font-family:sans-serif;}

/* PC版パネル（左上） */
.fp{position:fixed;top:10px;left:10px;z-index:1000;background:#fff;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.25);padding:8px;width:400px;box-sizing:border-box;max-height:calc(100vh - 80px);overflow-y:auto;}

/* スマホボトムシート */
.bs-wrap{
  position:fixed;bottom:0;left:0;right:0;z-index:1000;
  display:flex;
  flex-direction:column;
  max-height:70vh;
  pointer-events:none;
}
.bs-handle{
  pointer-events:all;
  background:#fff;
  border-radius:12px 12px 0 0;
  box-shadow:0 -2px 8px rgba(0,0,0,.15);
  padding:12px;
}
.bs-handle-bar{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 8px;}
.bs-handle-row{display:flex;align-items:center;gap:8px;}
.bs-title{margin:0;flex:1;font-size:16px;font-weight:bold;color:#333;}
.bs-top-btn{padding:6px 8px;border:1.5px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;font-size:13px;font-weight:bold;color:#666;transition:all .15s;flex-shrink:0;}
.bs-top-btn:hover{background:#f5f5f5;}

.bs-body{
  pointer-events:all;
  background:#fff;
  overflow-y:auto;
  box-shadow:0 -2px 8px rgba(0,0,0,.1);
  padding:12px;
  transition:max-height .3s ease;
  flex:1;
}
.bs-body.collapsed{max-height:0;overflow:hidden;padding:0 12px;}

/* 共通スタイル */
.category-section{margin-bottom:6px;border-bottom:1px solid #eee;padding-bottom:4px;}
.category-title{font-size:13px;font-weight:bold;color:#333;margin-bottom:6px;display:flex;align-items:center;}
.category-icon{margin-right:4px;font-size:16px;}

.filter-label{font-size:10px;font-weight:bold;color:#999;margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;}
.filter-row{display:flex;gap:4px;margin-bottom:4px;flex-wrap:wrap;}
.filter-btn{flex:1;min-width:0;padding:6px 4px;border:1.5px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;font-size:11px;font-weight:bold;text-align:center;color:#666;transition:all .15s;}
.filter-btn:hover{background:#f5f5f5;}
.filter-btn.on{background:#B3E5FC;border-color:#0277BD;color:#0277BD;}

/* 2行表示ボタン */
.filter-btn-dual{padding:4px 2px;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.1;}
.filter-btn-dual:hover{background:#f5f5f5;}
.filter-btn-dual.on{background:#B3E5FC;border-color:#0277BD;color:#0277BD;}

/* HS グリッドボタン */
.hs-grid-container{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:8px 0;margin-bottom:0;border-bottom:none;}
.hs-grid-btn{padding:6px 4px;border:1.5px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;font-size:11px;font-weight:bold;text-align:center;color:#666;transition:all .15s;width:100%;}
.hs-grid-btn:hover{background:#f5f5f5;}
.hs-grid-btn.on{background:#B3E5FC;border-color:#0277BD;color:#0277BD;}

.toggle-btn{padding:6px 8px;border:1.5px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;font-size:11px;font-weight:bold;color:#666;transition:all .15s;flex:1;}
.toggle-btn:hover{background:#f5f5f5;}
.toggle-btn.on{background:#66BB6A;border-color:#2E7D32;color:#fff;}

.top-btn-row{display:flex;gap:6px;margin-bottom:8px;align-items:center;width:fit-content;}

.gm-svpc, .gm-style-cc, button[title="キーボード ショートカット"], .gm-bundled-control, .gm-bundled-control-on-bottom{display:none!important;}
.gm-ui-hover-effect{display:none!important;}

.popup-link{color:#1a73e8;text-decoration:none;font-weight:bold;}
.popup-link:hover{text-decoration:underline;}

.info-popup{line-height:1.6;min-width:240px;font-size:12px;}
.info-popup .title{font-size:13px;font-weight:bold;margin-bottom:4px;color:#1a73e8;}
.info-popup .subtitle{color:#666;margin-bottom:6px;font-size:11px;}
.info-popup .info-row{margin-bottom:4px;font-size:11px;}
.info-popup .info-label{font-weight:bold;color:#333;display:inline-block;width:80px;}
.info-popup .badges{margin:6px 0;font-size:11px;}
.info-popup .badge{padding:2px 6px;display:inline-block;border-radius:3px;margin-right:4px;margin-bottom:2px;font-size:10px;}
.info-popup .badge.accom{background:#FFE0E0;color:#C00;}
.info-popup .badge.hotspring{background:#FFE8D0;color:#F60;}
.info-popup .badge.shower{background:#E8F5E9;color:#388E3C;}
.info-popup .badge.bath{background:#FFE0E0;color:#C00;}
.info-popup .badge.power{background:#E3F2FD;color:#1565C0;}
.info-popup .badge.auto{background:#FFF9C4;color:#F57F17;}
.info-popup .badge.free{background:#E0F2F1;color:#00695C;}
.info-popup .links{border-top:1px solid #eee;padding-top:6px;margin-top:6px;}

/* 検索ボックス */
.search-row{display:flex;gap:4px;align-items:center;margin-bottom:6px;}
.search-row input{flex:1;border:1px solid #ddd;border-radius:4px;padding:5px 8px;font-size:12px;outline:none;min-width:0;}
.search-row input:focus{border-color:#1a73e8;}
.search-row .s-btn{padding:5px 8px;background:#1a73e8;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:bold;white-space:nowrap;}
.search-row .s-btn:hover{background:#1557b0;}
.sat-btn{padding:5px 7px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;font-size:14px;white-space:nowrap;flex-shrink:0;}

/* スポット登録ポップアップ */
.add-popup{line-height:1.7;min-width:220px;max-width:260px;font-size:13px;}
.add-popup select{width:100%;padding:4px;border:1px solid #ddd;border-radius:4px;font-size:12px;margin-bottom:4px;}
.add-popup input{width:100%;padding:4px;border:1px solid #ddd;border-radius:4px;font-size:12px;margin-bottom:4px;box-sizing:border-box;}
.add-popup textarea{width:100%;padding:4px;border:1px solid #ddd;border-radius:4px;font-size:12px;margin-bottom:4px;box-sizing:border-box;resize:vertical;}
.add-popup button{width:100%;padding:6px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:bold;}
.btn-add{background:#34a853;color:#fff;margin-bottom:4px;}
.btn-add:hover{background:#2d8f47;}
.btn-cancel{background:#fff;color:#666;border:1px solid #ddd !important;}

/* レスポンシブ */
@media(max-width:600px){
  .fp{display:none !important;}
  .bs-wrap{display:flex !important;}
}
@media(min-width:601px){
  .fp{display:block !important;}
  .bs-wrap{display:none !important;}
}
@keyframes loadPulse{0%,100%{opacity:1}50%{opacity:.25}}
.load-dot{width:12px;height:12px;border-radius:50%;background:#bbb;animation:loadPulse 1.2s infinite;flex-shrink:0;align-self:center;cursor:default;}
.load-dot.done{background:#4caf50;animation:none;}
</style>
</head>

<script>
var MY_API_KEY  = "AIzaSyAMBPa_T_URVyJNn1lHnXjzDiEZoKPNPSw";
var CDN_URL     = 'https://raw.githubusercontent.com/wherethereisawillthereisaway2026/shakuhachi-map-data/main/data.json';
var GAS_URL     = 'https://script.google.com/macros/s/AKfycbzAsigVzyCuiBpu97pjzT342023sdAPRVPtRx92fpe-Gzp7J9DQDNAbjfuE3cGnNIOEyg/exec';
var FES_MAP_URL = 'https://wherethereisawillthereisaway2026.github.io/matsuri-map-data/';

function _gasPost(payload) {
  return fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify(payload)
  }).then(function(r) { return r.json(); });
}

// GASのdoGetが注入していた相互リンクパラメータをURLSearchParamsで代替
(function() {
  var p = new URLSearchParams(window.location.search);
  if (p.get('lat') && p.get('lng')) {
    window._xLat = parseFloat(p.get('lat'));
    window._xLng = parseFloat(p.get('lng'));
    window._xZ   = p.get('z') ? parseInt(p.get('z')) : 12;
  }
})();
var map, infoWindow;
var activeMarkers = [];       // 現在表示中のMarker（カウント用）
var markerPool = new Map();   // key: "type:rowIndex" → marker（差分更新プール）
var allData = [];
var idleTimer = null;
var dataLoaded = false;  // GASからのデータ取得完了フラグ
var _undoStack = [];
var _pcUndoBtn = null;
var _mUndoBtn = null;

// 標高フィルター（0=指定なし, 500, 1000）
var elevationFilter = 0;

// フィルター状態管理（初期状態：全解除）
var filters = {
  RS: { accommodation: false, hotspring: false, shower: false, other: false },
  RV: { bathAndPower: false, bath: false, power: false, other: false },
  HS: { priceUnder1000: false, 1: false, 2: false, 3: false, 4: false, 5: false, 6: false, 7: false, 8: false, 9: false, 10: false, 11: false, 12: false, 13: false },
  CAMP: { auto: false, other: false },
  VAN: { OB: false, SH: false, SH3: false, PA: false, WA: false, SH2_2: false, SH2_1: false, SH2_0: false }
};

// 展望台：トイレ500m以内フィルター
var obToiletFilter = false;

// 全選択状態管理（トップメニュー）
var isAllSelected = false;

// 各カテゴリの全選択状態管理
var categoryAllSelected = {
  RS: false,
  RV: false,
  HS: false,
  CAMP: false,
  VAN: false
};

// HS カテゴリ定義
const HS_CATEGORIES = {
  1: 'スーパー', 2: '日帰り', 3: '銭湯', 4: '日帰り宿', 5: '共同',
  6: 'スポーツ', 7: 'サウナ', 8: '岩盤浴', 9: '足湯', 10: '日帰りP',
  11: '自然湯', 12: 'デイ', 13: '手湯'
};

// マーカー色定義
const MARKER_COLORS = {
  'RS':   '#90CAF9',
  'RV':   '#FFCC80',
  'HS':   '#CE93D8',
  'CAMP': '#A5D6A7',

  'PA':   '#B0BEC5',
  'WA':   '#80DEEA'
};

function openOtherMap() {
  var center = map.getCenter();
  var params = '?lat=' + center.lat().toFixed(5) + '&lng=' + center.lng().toFixed(5) + '&z=' + map.getZoom();
  window.open(FES_MAP_URL + params, '_blank');
}

function openLightPollutionMap() {
  var center = map.getCenter();
  var lat = center.lat().toFixed(4);
  var lon = center.lng().toFixed(4);
  var zoom = map.getZoom().toFixed(2);
  var state = 'eyJiYXNlbWFwIjoiTGF5ZXJCaW5nUm9hZCIsIm92ZXJsYXkiOiJzYl8yMDI1Iiwib3ZlcmxheWNvbG9yIjpmYWxzZSwib3ZlcmxheW9wYWNpdHkiOiI2MCIsImZlYXR1cmVzb3BhY2l0eSI6Ijg1In0=';
  var url = 'https://www.lightpollutionmap.info/#zoom=' + zoom + '&lat=' + lat + '&lon=' + lon + '&state=' + state;
  window.open(url, '_blank');
}

function initMap() {
  _pcUndoBtn = document.getElementById('pcUndoBtn');
  _mUndoBtn  = document.getElementById('mUndoBtn');
  // doGetから注入された相互リンクパラメータを優先チェック
  var fromLink = typeof _xLat !== 'undefined';
  // 同タブ内で既に相互リンク座標を適用済みかチェック（リロード時はlocalStorageを優先）
  var isFirstCrossLink = fromLink && !sessionStorage.getItem('crossLinkApplied');
  if (isFirstCrossLink) sessionStorage.setItem('crossLinkApplied', '1');

  // フィルター状態をlocalStorageから復元
  try {
    var savedFilters = localStorage.getItem('mapFilters');
    if (savedFilters) {
      var parsed = JSON.parse(savedFilters);
      // 既知キーのみ上書き（新カテゴリ追加時に壊れないよう防御的にマージ）
      Object.keys(filters).forEach(function(group) {
        if (parsed[group]) {
          Object.keys(filters[group]).forEach(function(key) {
            if (typeof parsed[group][key] === 'boolean') {
              filters[group][key] = parsed[group][key];
            }
          });
        }
      });
    }
  } catch(e) {}

  // セッションから保存されたズーム位置を復元
  const savedZoom = localStorage.getItem('mapZoom');
  const savedLat = localStorage.getItem('mapLat');
  const savedLng = localStorage.getItem('mapLng');

  // 初期ズーム：初回相互リンク > localStorage > デフォルト
  const initialZoom = isFirstCrossLink ? _xZ : (savedZoom ? parseInt(savedZoom) : 8);
  const initialCenter = isFirstCrossLink
    ? { lat: _xLat, lng: _xLng }
    : (savedLat && savedLng)
      ? { lat: parseFloat(savedLat), lng: parseFloat(savedLng) }
      : { lat: 36.2048, lng: 138.2529 };
  
  map = new google.maps.Map(document.getElementById('map'), {
    zoom: initialZoom,
    center: initialCenter,
    fullscreenControl: false,
    streetViewControl: false,
    mapTypeControl: false,
    gestureHandling: 'greedy'
  });
  
  infoWindow = new google.maps.InfoWindow();
  
  map.addListener('click', function(event) {
    if (event.placeId) {
      // 地図上のPOIタップ → 詳細取得して登録フォームへ
      event.stop();
      var svc = new google.maps.places.PlacesService(map);
      svc.getDetails({
        placeId: event.placeId,
        fields: ['name', 'place_id', 'geometry', 'formatted_address']
      }, function(place, status) {
        if (status === google.maps.places.PlacesServiceStatus.OK) {
          showSearchResult(place);
        }
      });
    } else {
      infoWindow.close();
    }
  });
  
  // ズーム変更時：セッション保存のみ（描画はidleに任せる）
  map.addListener('zoom_changed', function() {
    localStorage.setItem('mapZoom', map.getZoom());
  });

  // 中心変更時にセッション保存
  map.addListener('center_changed', function() {
    const center = map.getCenter();
    localStorage.setItem('mapLat', center.lat());
    localStorage.setItem('mapLng', center.lng());
  });

  // マップ操作終了後にビューポートカリングで再描画（debounce 150ms）
  map.addListener('idle', function() {
    if (!dataLoaded) return;  // データ到着前の早期発火を無視
    clearTimeout(idleTimer);
    idleTimer = setTimeout(renderMarkers, 150);
  });
  
  loadData();
  buildUI();
  setupEventListeners();
  updateFilterUI();
}

function loadData() {
  fetch(CDN_URL + '?t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      allData = data;
      dataLoaded = true;
      renderMarkers();
    })
    .catch(function(err) {
      ['pcLoadDot','mLoadDot'].forEach(function(id){
        var el = document.getElementById(id);
        if (el) { el.className = 'load-dot'; el.style.background = '#f44336'; el.title = 'データ読み込み失敗: ' + err; }
      });
    });
}

function buildUI() {
  const fpContent = document.getElementById('fpContent');
  fpContent.innerHTML = '';
  
  // RS
  fpContent.innerHTML += '<div class="category-section" style="border-bottom:none;">' +
    '<div class="category-title"><span class="category-icon">🛣️</span>道の駅</div>' +

  // RV
  fpContent.innerHTML += '<div class="category-section" style="border-top:none;border-bottom:none;">' +
    '<div class="category-title"><span class="category-icon">🚐</span>RVパーク</div>' +
    '<div class="filter-row">' +
    '<button class="filter-btn" id="fpRV_all">全選択</button>' +
    '<button class="filter-btn" id="fpRV_bathAndPower">🛁🔌</button>' +
    '<button class="filter-btn" id="fpRV_bath">🛁入浴施設</button>' +
    '<button class="filter-btn" id="fpRV_power">🔌電源施設</button>' +
    '<button class="filter-btn" id="fpRV_other">🚐その他</button>' +
    '</div></div>';
  
  // HS 【修正】価格フィルター追加 + 5列×3段配置
  let hsHTML = '<div class="category-section" style="border-top:none;border-bottom:none;">' +
    '<div class="category-title"><span class="category-icon">♨️</span>温泉</div>' +
    '<div class="filter-row">' +

    '<button class="filter-btn" id="fpHS_priceUnder1000">🔴1000円未満</button>' +

function shouldDisplay(item) {
  // ズームフィルター（全カテゴリ共通：12未満は非表示）
  if (map.getZoom() < 12) return false;

  // 標高フィルター（HS以外に適用）
  if (elevationFilter > 0 && item.type !== 'HS') {
    var elev = parseFloat(item.elevation);
    if (isNaN(elev) || elev < elevationFilter) return false;
  }

  if (item.type === 'RS') {
    const hasChecked = filters.RS.accommodation || filters.RS.hotspring || filters.RS.shower || filters.RS.other;
    if (!hasChecked) return false;
    const isOther = !item.accommodation && !item.hotspring && !item.shower;
    if (filters.RS.accommodation && item.accommodation) return true;
    if (filters.RS.hotspring && item.hotspring) return true;
    if (filters.RS.shower && item.shower) return true;
    if (filters.RS.other && isOther) return true;
    return false;
  }
  
  if (item.type === 'RV') {
    const hasChecked = filters.RV.bathAndPower || filters.RV.bath || filters.RV.power || filters.RV.other;
    if (!hasChecked) return false;
    const isOther = !item.bath && !item.power;
    const isBathAndPower = item.bath && item.power;
    
    if (filters.RV.bathAndPower && isBathAndPower) return true;  // 入浴＆電源の両方
    if (filters.RV.bath && item.bath && !item.power) return true;  // 入浴施設のみ（電源なし）
    if (filters.RV.power && item.power && !item.bath) return true;  // 電源施設のみ（入浴なし）
    if (filters.RV.other && isOther) return true;  // その他
    return false;
  }
  
  if (item.type === 'HS') {
    // カテゴリチェック
    const hasCategory = Object.keys(filters.HS)
      .filter(k => k !== 'priceUnder1000')
      .some(k => filters.HS[k]);
    
    if (!hasCategory) return false;
    if (!filters.HS[item.category]) return false;
    
    // 価格フィルター：priceUnder1000 がONなら、0~999円のデータのみ
    if (filters.HS.priceUnder1000) {
      const priceMatch = item.price.match(/\d+/);
      if (!priceMatch) return false;
      const priceNum = Number(priceMatch[0]);
      if (priceNum >= 1000) return false;
    }
    
    return true;
  }
  
  if (item.type === 'CAMP') {
    const hasChecked = filters.CAMP.auto || filters.CAMP.other;
    if (!hasChecked) return false;
    if (filters.CAMP.auto && item.autoSite) return true;
    if (filters.CAMP.other && !item.autoSite) return true;
    return false;
  }
  
  if (item.type === 'OB') {
    if (!filters.VAN.OB) return false;
    if (obToiletFilter && (item.toiletDist === null || item.toiletDist > 500)) return false;
    return true;
  }

  if (item.type === 'SH') {
    return filters.VAN.SH;
  }

  if (item.type === 'SH2') {
    if (item.category === 2) return filters.VAN.SH2_2;
    if (item.category === 1) return filters.VAN.SH2_1;
    if (item.category === 0) return filters.VAN.SH2_0;
    return false;
  }

  if (item.type === 'SH3') {
    return filters.VAN.SH3;
  }

  if (item.type === 'PA') {
    return filters.VAN.PA;
  }

  if (item.type === 'WA') {
    return filters.VAN.WA;
  }

  return false;
}

function getMarkerKey(item) {
  return item.type + ':' + item.rowIndex;
}

function getMapUrl(item) {
  if (item.mapUrl) return item.mapUrl;  // SH / SH3: シート直格納リンク
  if (item.placeId) {
    return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(item.name) + '&query_place_id=' + item.placeId;
  }
  return 'https://www.google.com/maps?q=' + item.lat + ',' + item.lng;
}

function clearMarkerPool() {
  markerPool.forEach(function(m) { m.setMap(null); });
  markerPool.clear();
  activeMarkers = [];
}

var _emojiIconCache = {};
function createEmojiIcon(emoji, bgColor) {
  var key = emoji + '|' + (bgColor || '');
  if (_emojiIconCache[key]) return _emojiIconCache[key];
  var isDual = emoji.length > 3;
  var fontSize = isDual ? 13 : 18;
  var color = bgColor || '#9E9E9E';
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">'
    + '<circle cx="20" cy="20" r="18" fill="' + color + '" stroke="white" stroke-width="2"/>'
    + '<text x="20" y="25" font-size="' + fontSize + '" text-anchor="middle">' + emoji + '</text>'
    + '</svg>';
  var blob = new Blob([svg], {type: 'image/svg+xml'});
  var icon = {
    url: URL.createObjectURL(blob),
    scaledSize: new google.maps.Size(40, 40),
    anchor: new google.maps.Point(20, 20)
  };
  _emojiIconCache[key] = icon;
  return icon;
}

function getMarkerColor(item) {
  return MARKER_COLORS[item.type] || '#9E9E9E';
}

function getMarkerEmoji(item) {
  if (item.type === 'HS') {
    if (item.category === 7) return '🧖';
    if (item.category === 8) return '🪨';
    if (item.category === 9 || item.category === 13) return '🦶';
    return '♨️';
  }
  if (item.type === 'RS') {
    if (item.accommodation) return '🛏️';
    if (item.hotspring) return '♨️';
    if (item.shower) return '🚿';
    return '🛣️';
  }
  if (item.type === 'RV') {
    if (item.bath && item.power) return '🛁🔌';
    if (item.bath) return '🛁';
    if (item.power) return '🔌';
    return '🚐';
  }
  if (item.type === 'CAMP') return item.autoSite ? '🚘' : '⛺';
  if (item.type === 'OB') return '🗼';
  if (item.type === 'SH') return '🚌';
  if (item.type === 'SH2') {
    if (item.category === 2) return '🚙';
    if (item.category === 1) return '🈶';
    return '⛔';
  }
  if (item.type === 'SH3') return '🛺';
  if (item.type === 'PA') return '🅿️';
  if (item.type === 'WA') return '🚰';
  return '📍';
}

// ビューポートカリング：差分更新（markerPool再利用）
function renderMarkers() {
  if (map.getZoom() < 12) {
    markerPool.forEach(function(m) { m.setMap(null); });
    activeMarkers = [];
    updateMarkerCount();
    return;
  }

  var bounds = map.getBounds();
  if (!bounds) return;

  var shouldShow = new Set();
  var dataIndex = new Map();
  for (var i = 0; i < allData.length; i++) {
    var item = allData[i];
    var key = getMarkerKey(item);
    dataIndex.set(key, item);
    if (!shouldDisplay(item)) continue;
    if (!bounds.contains({ lat: item.lat, lng: item.lng })) continue;
    shouldShow.add(key);
  }

  // 既存マーカーを表示／非表示に切り替え
  markerPool.forEach(function(m, key) {
    if (shouldShow.has(key)) {
      if (!m.getMap()) m.setMap(map);
    } else {
      if (m.getMap()) m.setMap(null);
    }
  });

  // 新規マーカーのみ生成
  shouldShow.forEach(function(key) {
    if (!markerPool.has(key)) {
      var item = dataIndex.get(key);
      if (item) _createMarker(item);
    }
  });

  // activeMarkersを更新（カウント用）
  activeMarkers = [];
  markerPool.forEach(function(m) {
    if (m.getMap()) activeMarkers.push(m);
  });

  updateMarkerCount();
}

function _createMarker(item) {
  var marker = new google.maps.Marker({
    position: { lat: item.lat, lng: item.lng },
    map: map,
    title: item.name,
    icon: createEmojiIcon(getMarkerEmoji(item), getMarkerColor(item))
  });
  marker._item = item;

// ========== 削除キュー ==========
var _deleteQueue = [];
var _deleteInProgress = false;

function _processDeleteQueue() {
  if (_deleteInProgress || _deleteQueue.length === 0) return;
  _deleteInProgress = true;
  var job = _deleteQueue.shift();
  _executeDelete(job.rowIdx, job.type);
}

function _executeDelete(rowIdx, type) {
  _gasPost({action: 'deleteRow', rowIndex: rowIdx, type: type})
    .then(function(res) {
      if (!res.ok) {
        alert('削除に失敗しました: ' + (res.msg || ''));
      } else {
        _deleteQueue.forEach(function(job) {
          if (job.type === type && job.rowIdx > rowIdx) job.rowIdx -= 1;
        });
        allData.forEach(function(p) {
          if (p.type === type && p.rowIndex > rowIdx) p.rowIndex -= 1;
        });
      }
      _deleteInProgress = false;
      _processDeleteQueue();
    })
    .catch(function(e){
      alert('エラー: ' + e);
      _deleteInProgress = false;
      _processDeleteQueue();
    });
}

function deletePin(rowIdx, btn, type) {
  if (!btn._confirmMode) {
    btn._confirmMode = true;
    btn.textContent = '⚠ 本当に削除しますか？';
    btn.style.background = '#ea4335';
    btn.style.color = '#fff';
    btn._confirmTimer = setTimeout(function() {
      btn._confirmMode = false;
      btn.textContent = '🗑 削除';
      btn.style.background = '#fff';
      btn.style.color = '#ea4335';
    }, 3000);
    return;
  }
  clearTimeout(btn._confirmTimer);
  btn._confirmMode = false;
  btn.disabled = true;
  btn.textContent = '削除中...';

  // undoスタックに保存（SH3はaddRowなし対象外）
  if (type !== 'SH3') {
    var _delItem = allData.find(function(p){ return p.rowIndex === rowIdx && p.type === type; });
    if (_delItem) {
      var _pid = _delItem.placeId || '';
      _undoStack.push({ item: _delItem, pid: _pid, type: type });
      _updateUndoBtns();
    }
  }

  // UIからマーカーを即座に除去（確認後すぐ消す）
  var _delKey = type + ':' + rowIdx;
  allData = allData.filter(function(p){ return !(p.rowIndex === rowIdx && p.type === type); });
  for (var i = activeMarkers.length - 1; i >= 0; i--) {
    if (activeMarkers[i]._item.rowIndex === rowIdx && activeMarkers[i]._item.type === type) {
      activeMarkers[i].setMap(null);
      activeMarkers.splice(i, 1);
    }
  }
  markerPool.delete(_delKey);
  infoWindow.close();

  // キューに追加して順番に処理
  _deleteQueue.push({ rowIdx: rowIdx, type: type });
  _processDeleteQueue();
}

// ========== Undo ==========
function _updateUndoBtns() {
  var can = _undoStack.length > 0;
  if (_pcUndoBtn) { _pcUndoBtn.disabled = !can; _pcUndoBtn.style.opacity = can ? '1' : '0.35'; }
  if (_mUndoBtn)  { _mUndoBtn.disabled  = !can; _mUndoBtn.style.opacity  = can ? '1' : '0.35'; }
}

function undoLastDelete() {
  if (_undoStack.length === 0) return;
  var entry = _undoStack.pop();
  _updateUndoBtns();
  var item = entry.item;
  var type = entry.type;

  var onSuccess = function(res) {
    if (res.ok) {
      item.rowIndex = res.rowIndex;
      allData.push(item);
      renderMarkers();
    } else {
      alert('元に戻せませんでした: ' + (res.msg || ''));
      _undoStack.push(entry);
    }
    _updateUndoBtns();
  };
  var onFail = function(e) {
    alert('エラー: ' + e);
    _undoStack.push(entry);
    _updateUndoBtns();
  };

  var data = Object.assign({ placeId: entry.pid }, item);
  _gasPost({action: 'addRow', type: type, data: data})
    .then(onSuccess)
    .catch(onFail);
}

      renderMarkers();
      if (btn) { btn.textContent = '✓'; setTimeout(function(){ btn.textContent = '🔄'; btn.disabled = false; }, 1500); }
    })
    .catch(function(e) {
      if (btn) { btn.textContent = '🔄'; btn.disabled = false; }
      alert('再取得失敗: ' + e);
    });
}

      map.setCenter(pos);

  }

  var elevInput = document.getElementById('reg-elevation');
  var elevation = elevInput && elevInput.style.display !== 'none' ? elevInput.value : '';

  function _getVal(id) {
    var el = document.getElementById(id);
    return (el && el.style.display !== 'none') ? el.value.trim() : '';
  }
  var price         = _getVal('reg-price');
  var businessHours = _getVal('reg-business-hours');
  var closedDay     = _getVal('reg-closed-day');
  var officialUrl   = _getVal('reg-official-url');
  var info1         = _getVal('reg-info1');
  var info          = _getVal('reg-info');
  var kind          = _getVal('reg-kind');
  var memo          = _getVal('reg-memo');

  var btn = document.querySelector('.add-popup .btn-add');
  if (btn) { btn.disabled = true; btn.textContent = '登録中...'; }

  var hs_catName = '';
  if (sheet === 'HS') {
    var found = SHEET_CATS.HS.find(function(c){ return c.val === category; });
    hs_catName = found ? found.label : '';
  }

  var mapUrl = place.place_id
    ? 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(place.name) + '&query_place_id=' + place.place_id
    : 'https://www.google.com/maps?q=' + place.geometry.location.lat() + ',' + place.geometry.location.lng();

  _gasPost({action: 'addSpot', data: {
      sheet:         sheet,
      category:      category,
      categoryName:  hs_catName,
      name:          place.name || '',
      address:       place.formatted_address || '',
      placeId:       place.place_id || '',
      lat:           place.geometry.location.lat(),
      lng:           place.geometry.location.lng(),
      elevation:     elevation,
      mapUrl:        mapUrl,
      price:         price,
      businessHours: businessHours,
      closedDay:     closedDay,
      officialUrl:   officialUrl,
      info1:         info1,
      info:          info,
      kind:          kind,
      memo:          memo
    }})
    .then(function(res) {
      if (res.ok) {
        if (btn) { btn.textContent = '✓ 登録しました'; btn.style.background = '#2d8f47'; }
        if (sheet === 'HS' && category) {
          filters.HS[parseInt(category)] = true;
          try { localStorage.setItem('mapFilters', JSON.stringify(filters)); } catch(e) {}
        } else if (sheet === 'SH' || sheet === 'SH2' || sheet === 'SH3') {
          if (sheet === 'SH') filters.VAN.SH = true;
          if (sheet === 'SH2') { filters.VAN.SH2_0 = true; filters.VAN.SH2_1 = true; filters.VAN.SH2_2 = true; }
          if (sheet === 'SH3') filters.VAN.SH3 = true;
          try { localStorage.setItem('mapFilters', JSON.stringify(filters)); } catch(e) {}
        } else if (sheet === 'RS') {
          filters.RS.accommodation = true; filters.RS.hotspring = true; filters.RS.shower = true; filters.RS.other = true;
          try { localStorage.setItem('mapFilters', JSON.stringify(filters)); } catch(e) {}
        }
        setTimeout(function() {
          infoWindow.close();
          if (_searchMarker) { _searchMarker.setMap(null); _searchMarker = null; }
        }, 1500);
      } else {
        if (btn) { btn.disabled = false; btn.textContent = '📌 登録する'; }
        alert('エラー: ' + (res.msg || ''));
      }
    })
    .catch(function(e) {
      if (btn) { btn.disabled = false; btn.textContent = '📌 登録する'; }
      alert('エラー: ' + e);
    });
}

// 🔍 テキスト検索実行
function doSearch(inputEl) {
  var svc = new google.maps.places.PlacesService(map);
  svc.findPlaceFromQuery({
    query: inputEl.value,
    fields: ['name','place_id','geometry','formatted_address']
  }, function(results, status) {
    if (status === google.maps.places.PlacesServiceStatus.OK && results[0]) showSearchResult(results[0]);
  });
}

// 🔍 Autocomplete初期化
function initAutocomplete(inputEl) {
  var ac = new google.maps.places.Autocomplete(inputEl, {
    componentRestrictions: {country:'jp'},
    fields: ['name','place_id','geometry','formatted_address']
  });
  ac.addListener('place_changed', function() { showSearchResult(ac.getPlace()); });
}

window.addEventListener('load', function() {
  const script = document.createElement('script');
  script.src = 'https://maps.googleapis.com/maps/api/js?key=' + MY_API_KEY + '&libraries=places';
  script.onload = function() {
    initMap();
    // PC版
    var fpSat = document.getElementById('fpSatBtn');
    fpSat.addEventListener('click', function(){ toggleSatellite(fpSat); });
    var fpInput = document.getElementById('fpSearchInput');
    document.getElementById('fpSearchBtn').addEventListener('click', function(){ doSearch(fpInput); });
    fpInput.addEventListener('keydown', function(e){ if(e.key==='Enter') doSearch(fpInput); });
    initAutocomplete(fpInput);
    // スマホ版
    var bsSat = document.getElementById('bsSatBtn');
    bsSat.addEventListener('click', function(){ toggleSatellite(bsSat); });
    var bsInput = document.getElementById('bsSearchInput');
    document.getElementById('bsSearchBtn').addEventListener('click', function(){ doSearch(bsInput); });
    bsInput.addEventListener('keydown', function(e){ if(e.key==='Enter') doSearch(bsInput); });
    initAutocomplete(bsInput);
  };
  document.head.appendChild(script);
});
